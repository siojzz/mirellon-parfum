<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 500">
  <!-- Mirellon hero backdrop: gold line-art bottle + botanical branches,
       all anchored to the bottom edge so the headline area stays clear. -->
  <defs>
    <path id="leaf" d="M0,-17 C9,-9 9,9 0,17 C-9,9 -9,-9 0,-17 Z"/>
    <g id="branch">
      <path d="M60,480 C130,400 190,360 230,320 C280,270 330,230 380,180 C410,150 440,125 465,100"
            fill="none" stroke="#c8a96a" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
      <use href="#leaf" transform="translate(112,428) rotate(-55) scale(1.05)" fill="none" stroke="#c8a96a" stroke-width="1.1"/>
      <use href="#leaf" transform="translate(160,374) rotate(125) scale(0.95)" fill="none" stroke="#c8a96a" stroke-width="1.1"/>
      <use href="#leaf" transform="translate(206,330) rotate(-45) scale(0.9)" fill="none" stroke="#c8a96a" stroke-width="1.1"/>
      <use href="#leaf" transform="translate(255,284) rotate(120) scale(0.82)" fill="none" stroke="#c8a96a" stroke-width="1"/>
      <use href="#leaf" transform="translate(305,240) rotate(-35) scale(0.74)" fill="none" stroke="#c8a96a" stroke-width="1"/>
      <use href="#leaf" transform="translate(355,196) rotate(115) scale(0.64)" fill="none" stroke="#c8a96a" stroke-width="0.9"/>
      <use href="#leaf" transform="translate(404,156) rotate(-25) scale(0.54)" fill="none" stroke="#c8a96a" stroke-width="0.9"/>
      <use href="#leaf" transform="translate(444,116) rotate(110) scale(0.44)" fill="none" stroke="#c8a96a" stroke-width="0.8"/>
    </g>
  </defs>

  <!-- ground line -->
  <line x1="0" y1="462" x2="1920" y2="462" stroke="#c8a96a" stroke-width="1" opacity="0.35"/>

  <!-- left + mirrored right branch -->
  <use href="#branch"/>
  <use href="#branch" transform="translate(1920,0) scale(-1,1)"/>

  <!-- small sparkle accents -->
  <g fill="none" stroke="#c8a96a" stroke-width="1.1" opacity="0.7">
    <path d="M700,140 L706,156 L722,162 L706,168 L700,184 L694,168 L678,162 L694,156 Z"/>
    <path d="M1230,320 L1234,330 L1244,334 L1234,338 L1230,348 L1226,338 L1216,334 L1226,330 Z"/>
  </g>

  <!-- centered bottle -->
  <g fill="none" stroke="#c8a96a" stroke-width="1.6" stroke-linejoin="round">
    <rect x="940" y="100" width="40" height="28" rx="4"/>
    <rect x="949" y="128" width="22" height="26"/>
    <path d="M949,154 L918,196 L918,446 Q918,460 932,460 L988,460 Q1002,460 1002,446 L1002,196 L971,154 Z"/>
    <rect x="932" y="230" width="56" height="96"/>
    <line x1="942" y1="252" x2="978" y2="252" stroke-width="0.9"/>
    <line x1="942" y1="266" x2="978" y2="266" stroke-width="0.9"/>
    <line x1="942" y1="296" x2="978" y2="296" stroke-width="0.9"/>
  </g>
</svg>
